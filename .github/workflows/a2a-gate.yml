name: A2A gate campaign

# One dispatch = one homogeneous agent-group campaign.
#
# To exercise both groups per release, dispatch this workflow twice:
#   - once with agent_group=openclaw → campaign_id a2a-openclaw-<tag>-rN
#   - once with agent_group=hermes   → campaign_id a2a-hermes-<tag>-rN
#
# Each campaign provisions its own 4-node VPC (no cross-campaign
# contention). Evidence lands in runs/<campaign_id>/ and is rendered
# on the Pages site at /evidence/<campaign_id>/index.html.

on:
  workflow_dispatch:
    inputs:
      ai_memory_git_ref:
        description: "ai-memory-mcp release or git ref"
        required: true
        default: "v0.6.0"
      agent_group:
        description: "Which agent framework to run in this campaign. Every agent droplet in the campaign uses the SAME framework (homogeneous group)."
        required: true
        default: "openclaw"
        type: choice
        options:
          - openclaw
          - hermes
      campaign_id:
        description: "Campaign identifier (becomes runs/<id>/). Suggested format: a2a-<group>-<release>-rN"
        required: true
        default: "a2a-openclaw-v0.6.0-r1"
      region:
        description: "DigitalOcean region"
        required: false
        default: "nyc3"
      scenarios:
        description: "Space-separated scenario numbers. Default: 1 only (more as scripts land)."
        required: false
        default: "1"
      agent_droplet_size:
        description: "Agent droplet size. Bump to s-4vcpu-16gb for scenario 8 (Ollama)."
        required: false
        default: "s-2vcpu-4gb"
      openclaw_install_cmd:
        description: "Shell command to install OpenClaw on a droplet. Blank = placeholder driver (ai-memory CLI stand-in)."
        required: false
        default: ""
      hermes_install_cmd:
        description: "Shell command to install Hermes on a droplet. Blank = placeholder driver."
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # One campaign per group at a time; the two groups CAN run
  # concurrently against each other because they provision distinct
  # VPCs and distinct droplet names.
  group: a2a-gate-${{ github.event.inputs.agent_group }}
  cancel-in-progress: false

jobs:
  campaign:
    name: "a2a-${{ github.event.inputs.agent_group }} — provision + run scenarios"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      DIGITALOCEAN_SSH_KEY_FINGERPRINT: ${{ secrets.DIGITALOCEAN_SSH_KEY_FINGERPRINT }}
      TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
      TF_VAR_ssh_key_fingerprint: ${{ secrets.DIGITALOCEAN_SSH_KEY_FINGERPRINT }}
      TF_VAR_campaign_id: ${{ github.event.inputs.campaign_id }}
      TF_VAR_agent_type: ${{ github.event.inputs.agent_group }}
      TF_VAR_ai_memory_git_ref: ${{ github.event.inputs.ai_memory_git_ref }}
      TF_VAR_region: ${{ github.event.inputs.region }}
      TF_VAR_agent_droplet_size: ${{ github.event.inputs.agent_droplet_size }}
      CAMPAIGN_ID: ${{ github.event.inputs.campaign_id }}
      AGENT_GROUP: ${{ github.event.inputs.agent_group }}
      AI_MEMORY_GIT_REF: ${{ github.event.inputs.ai_memory_git_ref }}
      OPENCLAW_INSTALL_CMD: ${{ github.event.inputs.openclaw_install_cmd }}
      HERMES_INSTALL_CMD: ${{ github.event.inputs.hermes_install_cmd }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up SSH private key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform init + apply
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve
          terraform output -json > ../terraform-output.json

      - name: Wait for SSH
        id: wait
        run: |
          set -e
          MEMORY_IP=$(jq -r '.memory_node.value.public' terraform-output.json)
          MEMORY_PRIV=$(jq -r '.memory_node.value.private' terraform-output.json)
          NODE1_IP=$(jq -r '.agents.value["node-1"].public' terraform-output.json)
          NODE2_IP=$(jq -r '.agents.value["node-2"].public' terraform-output.json)
          NODE3_IP=$(jq -r '.agents.value["node-3"].public' terraform-output.json)
          NODE1_PRIV=$(jq -r '.agents.value["node-1"].private' terraform-output.json)
          NODE2_PRIV=$(jq -r '.agents.value["node-2"].private' terraform-output.json)
          NODE3_PRIV=$(jq -r '.agents.value["node-3"].private' terraform-output.json)
          for role in memory:$MEMORY_IP n1:$NODE1_IP n2:$NODE2_IP n3:$NODE3_IP; do
            key=${role%%:*}; ip=${role##*:}
            echo "::group::wait-for-ssh $key ($ip)"
            ready=false
            for attempt in $(seq 1 30); do
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 \
                   -o BatchMode=yes root@"$ip" "uname -a" 2>/dev/null; then
                ready=true; break
              fi
              sleep 5
            done
            echo "::endgroup::"
            [ "$ready" = true ] || { echo "::error::$key SSH never responded"; exit 1; }
          done
          echo "memory_ip=$MEMORY_IP"     >> "$GITHUB_OUTPUT"
          echo "memory_priv=$MEMORY_PRIV" >> "$GITHUB_OUTPUT"
          echo "node1_ip=$NODE1_IP"       >> "$GITHUB_OUTPUT"
          echo "node2_ip=$NODE2_IP"       >> "$GITHUB_OUTPUT"
          echo "node3_ip=$NODE3_IP"       >> "$GITHUB_OUTPUT"
          echo "node1_priv=$NODE1_PRIV"   >> "$GITHUB_OUTPUT"
          echo "node2_priv=$NODE2_PRIV"   >> "$GITHUB_OUTPUT"
          echo "node3_priv=$NODE3_PRIV"   >> "$GITHUB_OUTPUT"

      - name: Provision all 4 nodes (federation mesh)
        run: |
          set -e
          AMV=$(echo '${{ github.event.inputs.ai_memory_git_ref }}' | sed -e 's/^v//' -e 's|release/||')
          # Compute per-node PEER_URLS: every node federates with the
          # other 3 on port 9077 via private IPs. W=2 of N=4.
          P1=http://${{ steps.wait.outputs.node1_priv }}:9077
          P2=http://${{ steps.wait.outputs.node2_priv }}:9077
          P3=http://${{ steps.wait.outputs.node3_priv }}:9077
          P4=http://${{ steps.wait.outputs.memory_priv }}:9077
          declare -A NODE
          NODE[1]="${{ steps.wait.outputs.node1_ip }}|agent|ai:alice|$P2,$P3,$P4"
          NODE[2]="${{ steps.wait.outputs.node2_ip }}|agent|ai:bob|$P1,$P3,$P4"
          NODE[3]="${{ steps.wait.outputs.node3_ip }}|agent|ai:charlie|$P1,$P2,$P4"
          NODE[4]="${{ steps.wait.outputs.memory_ip }}|memory-only||$P1,$P2,$P3"
          for i in 1 2 3 4; do
            IFS='|' read -r ip role aid peers <<< "${NODE[$i]}"
            echo "::group::provision node-$i (role=$role, peers=$peers)"
            scp -o StrictHostKeyChecking=no scripts/setup_node.sh scripts/drive_agent.sh root@$ip:/root/
            chmod_cmd="chmod +x /root/setup_node.sh /root/drive_agent.sh"
            env_cmd="NODE_INDEX=$i ROLE=$role PEER_URLS='$peers' AI_MEMORY_VERSION=$AMV"
            [ "$role" = "agent" ] && env_cmd="$env_cmd AGENT_TYPE=${AGENT_GROUP} AGENT_ID=$aid XAI_API_KEY='${XAI_API_KEY}' OPENCLAW_INSTALL_CMD='${OPENCLAW_INSTALL_CMD}' HERMES_INSTALL_CMD='${HERMES_INSTALL_CMD}'"
            ssh -o StrictHostKeyChecking=no root@$ip "$chmod_cmd && $env_cmd bash /root/setup_node.sh"
            echo "::endgroup::"
          done

      - name: Run scenarios
        id: scenarios
        run: |
          set -e
          mkdir -p phase-reports
          START_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "start_ts=$START_TS" >> "$GITHUB_OUTPUT"
          SCENARIOS_RUN=()
          for s in ${{ github.event.inputs.scenarios }}; do
            script=$(ls scripts/scenarios/${s}_*.sh 2>/dev/null | head -1)
            if [ -z "$script" ]; then
              echo "::warning::scenario $s has no implementation yet — skipping"
              continue
            fi
            echo "::group::scenario $s ($script)"
            # Split streams: stdout = final JSON report; stderr = console
            # trace (log() lines). Mixing them corrupts the JSON contract
            # the aggregator depends on and breaks the dashboard rollup.
            SCN_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            NODE1_IP=${{ steps.wait.outputs.node1_ip }} \
            NODE2_IP=${{ steps.wait.outputs.node2_ip }} \
            NODE3_IP=${{ steps.wait.outputs.node3_ip }} \
            NODE4_IP=${{ steps.wait.outputs.memory_ip }} \
            MEMORY_NODE_IP=${{ steps.wait.outputs.memory_priv }} \
            AGENT_GROUP=${AGENT_GROUP} \
              bash "$script" \
                > "phase-reports/scenario-${s}.json" \
                2> "phase-reports/scenario-${s}.log" || true
            SCN_END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            SCENARIOS_RUN+=("${s}:${SCN_START}:${SCN_END}")
            # Echo the log to the job output so CI viewers see it too.
            sed 's|^|[scenario-'"$s"' log] |' "phase-reports/scenario-${s}.log" || true
            echo "::endgroup::"
          done
          printf '%s\n' "${SCENARIOS_RUN[@]}" > phase-reports/scenario-timings.txt
          echo "end_ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Emit campaign.meta.json
        if: always()
        run: |
          set -e
          jq -n \
            --arg campaign_id    "${{ github.event.inputs.campaign_id }}" \
            --arg agent_group    "${AGENT_GROUP}" \
            --arg ai_memory_ref  "${AI_MEMORY_GIT_REF}" \
            --arg region         "${{ github.event.inputs.region }}" \
            --arg droplet_size   "${{ github.event.inputs.agent_droplet_size }}" \
            --arg scenarios_req  "${{ github.event.inputs.scenarios }}" \
            --arg started_at     "${{ steps.scenarios.outputs.start_ts }}" \
            --arg ended_at       "${{ steps.scenarios.outputs.end_ts }}" \
            --arg actor          "${{ github.actor }}" \
            --arg workflow_url   "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg harness_sha    "${{ github.sha }}" \
            --arg runner_os      "${RUNNER_OS:-ubuntu-24.04}" \
            --arg node1_public   "${{ steps.wait.outputs.node1_ip }}" \
            --arg node1_private  "${{ steps.wait.outputs.node1_priv }}" \
            --arg node2_public   "${{ steps.wait.outputs.node2_ip }}" \
            --arg node2_private  "${{ steps.wait.outputs.node2_priv }}" \
            --arg node3_public   "${{ steps.wait.outputs.node3_ip }}" \
            --arg node3_private  "${{ steps.wait.outputs.node3_priv }}" \
            --arg node4_public   "${{ steps.wait.outputs.memory_ip }}" \
            --arg node4_private  "${{ steps.wait.outputs.memory_priv }}" \
            '{
              campaign_id: $campaign_id,
              agent_group: $agent_group,
              ai_memory_git_ref: $ai_memory_ref,
              infra: {
                provider: "digitalocean",
                region: $region,
                droplet_size: $droplet_size,
                topology: "4-node federation mesh (W=2/N=4)",
                nodes: [
                  {index:1, role:"agent",       agent_id:"ai:alice",   public_ip:$node1_public, private_ip:$node1_private},
                  {index:2, role:"agent",       agent_id:"ai:bob",     public_ip:$node2_public, private_ip:$node2_private},
                  {index:3, role:"agent",       agent_id:"ai:charlie", public_ip:$node3_public, private_ip:$node3_private},
                  {index:4, role:"memory-only", agent_id:null,         public_ip:$node4_public, private_ip:$node4_private}
                ]
              },
              scenarios_requested: ($scenarios_req | split(" ")),
              timing: { started_at: $started_at, ended_at: $ended_at },
              ci: {
                actor: $actor,
                workflow_url: $workflow_url,
                harness_sha: $harness_sha,
                runner_os: $runner_os
              }
            }' > phase-reports/campaign.meta.json
          cat phase-reports/campaign.meta.json

      - name: Aggregate campaign summary
        if: always()
        run: |
          AGENT_GROUP=${AGENT_GROUP} \
          bash scripts/collect_reports.sh a2a-summary.json phase-reports || true
          cat a2a-summary.json 2>/dev/null || echo "no summary"

      - name: Regenerate evidence HTML
        if: always()
        run: |
          CAMPAIGN_DIR="runs/${{ github.event.inputs.campaign_id }}"
          mkdir -p "$CAMPAIGN_DIR"
          cp phase-reports/*.json "$CAMPAIGN_DIR/" 2>/dev/null || true
          cp phase-reports/*.log  "$CAMPAIGN_DIR/" 2>/dev/null || true
          cp a2a-summary.json "$CAMPAIGN_DIR/" 2>/dev/null || true
          bash scripts/generate_run_html.sh "$CAMPAIGN_DIR" || true

      - name: Commit campaign artefacts
        if: always()
        run: |
          set +e
          CAMPAIGN_DIR="runs/${{ github.event.inputs.campaign_id }}"
          git config user.name "a2a-gate-bot"
          git config user.email "a2a-gate-bot@users.noreply.github.com"
          git add "$CAMPAIGN_DIR" || true
          if [ -z "$(git status --porcelain)" ]; then
            echo "::notice::no artefacts to commit"
            exit 0
          fi
          git commit -m "campaign: ${{ github.event.inputs.campaign_id }} artefacts" || true
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "::notice::pushed on attempt $attempt"
              exit 0
            fi
            git fetch origin main
            git rebase origin/main || { echo "::error::rebase conflict"; git rebase --abort; exit 1; }
            sleep $((attempt * 2))
          done
          echo "::error::failed to push artefacts after 5 attempts"
          exit 1

      - name: Tear down infrastructure
        if: always()
        working-directory: terraform
        run: |
          terraform destroy -auto-approve || true

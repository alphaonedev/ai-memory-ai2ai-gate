name: A2A gate campaign

on:
  workflow_dispatch:
    inputs:
      ai_memory_git_ref:
        description: "ai-memory-mcp release or git ref to validate"
        required: true
        default: "v0.6.0"
      campaign_id:
        description: "Campaign identifier (becomes runs/<id>/)"
        required: true
        default: "a2a-candidate"
      region:
        description: "DigitalOcean region"
        required: false
        default: "nyc3"
      scenarios:
        description: "Space-separated scenario numbers to run. Default: 1 only (more land as scripts are implemented)."
        required: false
        default: "1"
      agent_droplet_size:
        description: "Agent droplet size. Bump to s-4vcpu-16gb for scenario 8 (Ollama auto-tagging)."
        required: false
        default: "s-2vcpu-4gb"
      openclaw_install_cmd:
        description: "Override: shell command to install the OpenClaw agent on a droplet. Leave blank to use the placeholder scaffold."
        required: false
        default: ""
      hermes_install_cmd:
        description: "Override: shell command to install the Hermes agent on a droplet. Leave blank to use the placeholder scaffold."
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: a2a-gate-campaign
  cancel-in-progress: false

jobs:
  campaign:
    name: "Provision + run scenarios"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      DIGITALOCEAN_SSH_KEY_FINGERPRINT: ${{ secrets.DIGITALOCEAN_SSH_KEY_FINGERPRINT }}
      TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
      TF_VAR_ssh_key_fingerprint: ${{ secrets.DIGITALOCEAN_SSH_KEY_FINGERPRINT }}
      TF_VAR_campaign_id: ${{ github.event.inputs.campaign_id }}
      TF_VAR_ai_memory_git_ref: ${{ github.event.inputs.ai_memory_git_ref }}
      TF_VAR_region: ${{ github.event.inputs.region }}
      TF_VAR_agent_droplet_size: ${{ github.event.inputs.agent_droplet_size }}
      CAMPAIGN_ID: ${{ github.event.inputs.campaign_id }}
      AI_MEMORY_GIT_REF: ${{ github.event.inputs.ai_memory_git_ref }}
      OPENCLAW_INSTALL_CMD: ${{ github.event.inputs.openclaw_install_cmd }}
      HERMES_INSTALL_CMD: ${{ github.event.inputs.hermes_install_cmd }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up SSH private key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform init + apply
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve
          terraform output -json > ../terraform-output.json

      - name: Wait for SSH
        id: wait
        run: |
          set -e
          MEMORY_IP=$(jq -r '.memory_node.value.public' terraform-output.json)
          MEMORY_PRIV=$(jq -r '.memory_node.value.private' terraform-output.json)
          NODE1_IP=$(jq -r '.agents.value["node-1"].public' terraform-output.json)
          NODE2_IP=$(jq -r '.agents.value["node-2"].public' terraform-output.json)
          NODE3_IP=$(jq -r '.agents.value["node-3"].public' terraform-output.json)
          for role in memory:$MEMORY_IP n1:$NODE1_IP n2:$NODE2_IP n3:$NODE3_IP; do
            key=${role%%:*}; ip=${role##*:}
            echo "::group::wait-for-ssh $key ($ip)"
            ready=false
            for attempt in $(seq 1 30); do
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 \
                   -o BatchMode=yes root@"$ip" "uname -a" 2>/dev/null; then
                ready=true; break
              fi
              sleep 5
            done
            echo "::endgroup::"
            [ "$ready" = true ] || { echo "::error::$key SSH never responded"; exit 1; }
          done
          echo "memory_ip=$MEMORY_IP"       >> "$GITHUB_OUTPUT"
          echo "memory_priv=$MEMORY_PRIV"   >> "$GITHUB_OUTPUT"
          echo "node1_ip=$NODE1_IP"          >> "$GITHUB_OUTPUT"
          echo "node2_ip=$NODE2_IP"          >> "$GITHUB_OUTPUT"
          echo "node3_ip=$NODE3_IP"          >> "$GITHUB_OUTPUT"

      - name: Provision memory node (node-4)
        run: |
          set -e
          ip=${{ steps.wait.outputs.memory_ip }}
          scp -o StrictHostKeyChecking=no scripts/setup_memory_node.sh root@$ip:/root/
          ssh -o StrictHostKeyChecking=no root@$ip \
            "AI_MEMORY_VERSION=0.6.0 bash /root/setup_memory_node.sh"

      - name: Provision agent droplets (node-1, node-2, node-3)
        run: |
          set -e
          MEM_PRIV=${{ steps.wait.outputs.memory_priv }}
          for role in node-1:ai:alice:openclaw:${{ steps.wait.outputs.node1_ip }} \
                      node-2:ai:bob:hermes:${{ steps.wait.outputs.node2_ip }} \
                      node-3:ai:charlie:openclaw:${{ steps.wait.outputs.node3_ip }}; do
            name=$(echo "$role" | cut -d: -f1)
            aid=$(echo "$role"  | cut -d: -f2-3)
            atype=$(echo "$role" | cut -d: -f4)
            ip=$(echo "$role"   | cut -d: -f5)
            echo "::group::provision $name ($atype / $aid / $ip)"
            scp -o StrictHostKeyChecking=no scripts/setup_agent.sh root@$ip:/root/
            ssh -o StrictHostKeyChecking=no root@$ip \
              "AGENT_TYPE=$atype AGENT_ID=$aid MEMORY_NODE_IP=$MEM_PRIV \
               OPENCLAW_INSTALL_CMD='${OPENCLAW_INSTALL_CMD}' \
               HERMES_INSTALL_CMD='${HERMES_INSTALL_CMD}' \
               bash /root/setup_agent.sh"
            echo "::endgroup::"
          done

      - name: Run scenarios
        run: |
          set -e
          mkdir -p phase-reports
          for s in ${{ github.event.inputs.scenarios }}; do
            script="scripts/scenarios/${s}_*.sh"
            found=$(ls $script 2>/dev/null | head -1)
            if [ -z "$found" ]; then
              echo "::warning::scenario $s has no implementation yet — skipping"
              continue
            fi
            echo "::group::scenario $s ($found)"
            NODE1_IP=${{ steps.wait.outputs.node1_ip }} \
            NODE2_IP=${{ steps.wait.outputs.node2_ip }} \
            NODE3_IP=${{ steps.wait.outputs.node3_ip }} \
            MEMORY_NODE_IP=${{ steps.wait.outputs.memory_priv }} \
              bash "$found" > "phase-reports/scenario-$s.json" 2>&1 || true
            echo "::endgroup::"
          done

      - name: Aggregate campaign summary
        if: always()
        run: |
          bash scripts/collect_reports.sh a2a-summary.json phase-reports || true
          cat a2a-summary.json 2>/dev/null || echo "no summary"

      - name: Commit campaign artefacts
        if: always()
        run: |
          set +e
          CAMPAIGN_DIR="runs/${{ github.event.inputs.campaign_id }}"
          mkdir -p "$CAMPAIGN_DIR"
          cp phase-reports/*.json "$CAMPAIGN_DIR/" 2>/dev/null || true
          cp a2a-summary.json "$CAMPAIGN_DIR/" 2>/dev/null || true
          git config user.name "a2a-gate-bot"
          git config user.email "a2a-gate-bot@users.noreply.github.com"
          git add "$CAMPAIGN_DIR" || true
          if [ -z "$(git status --porcelain)" ]; then
            echo "::notice::no artefacts to commit"
            exit 0
          fi
          git commit -m "campaign: ${{ github.event.inputs.campaign_id }} artefacts" || true
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "::notice::pushed on attempt $attempt"
              exit 0
            fi
            git fetch origin main
            git rebase origin/main || { echo "::error::rebase conflict"; git rebase --abort; exit 1; }
            sleep $((attempt * 2))
          done
          echo "::error::failed to push artefacts after 5 attempts"
          exit 1

      - name: Tear down infrastructure
        if: always()
        working-directory: terraform
        run: |
          terraform destroy -auto-approve || true

name: Publish GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "runs/**"
      - "analysis/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["A2A gate campaign"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install mkdocs-material
        run: pip install mkdocs-material mkdocs-macros-plugin

      - name: Build a landing page for runs/
        run: |
          set -euo pipefail
          mkdir -p docs/runs
          {
            echo "# Campaign runs"
            echo
            echo "Every A2A campaign run commits its scenario artefacts +"
            echo "generated evidence HTML here. Rows sort newest first by campaign"
            echo "id (version-aware, so r10 > r9). \`PASS\` / \`FAIL\` reflect"
            echo "\`overall_pass\` from \`a2a-summary.json\`; \`NO SUMMARY\` means the"
            echo "campaign ran but the aggregator couldn't recover any scenario"
            echo "JSON (legacy artefact format or pipeline failure — open the"
            echo "evidence page for the raw trace)."
            echo
            echo "| Campaign | Verdict | Scenarios | Group | ai-memory ref | Completed | Dispatched by | Evidence |"
            echo "|---|---|---|---|---|---|---|---|"
          } > docs/runs/index.md
          found_any=false
          for dir in $(ls -1d runs/*/ 2>/dev/null | sort -Vr); do
            found_any=true
            name=$(basename "$dir")
            summary="$dir/a2a-summary.json"
            meta="$dir/campaign.meta.json"
            if [ -f "$summary" ]; then
              ref=$(jq -r '.ai_memory_git_ref // "?"' "$summary")
              completed=$(jq -r '.completed_at // "?"' "$summary")
              pass=$(jq -r '.overall_pass // false' "$summary")
              group=$(jq -r '.agent_group // (.scenarios[0].agent_group // "?")' "$summary")
              if [ "$pass" = "true" ]; then outcome="✅ PASS"; else outcome="❌ FAIL"; fi
              scen_pass=$(jq -r '[.scenarios[]? | select(.pass == true)] | length' "$summary")
              scen_total=$(jq -r '.scenarios | length' "$summary" 2>/dev/null || echo "?")
              scen_cell="${scen_pass}/${scen_total}"
            else
              ref="?"; completed="?"; group="?"; outcome="⚠️ NO SUMMARY"
              scen_json_count=$(ls "$dir"/scenario-*.json 2>/dev/null | wc -l | tr -d ' ')
              scen_cell="—/${scen_json_count}"
            fi
            if [ -f "$meta" ]; then
              actor=$(jq -r '.ci.actor // "?"' "$meta")
              wurl=$(jq -r '.ci.workflow_url // ""' "$meta")
              ref=$(jq -r '.ai_memory_git_ref // "?"' "$meta")
              group=$(jq -r '.agent_group // "?"' "$meta")
            else
              actor="—"; wurl=""
            fi
            actor_cell=$([ -n "$wurl" ] && echo "[${actor}](${wurl})" || echo "$actor")
            evidence="[offline HTML](../evidence/${name}/index.html)"
            echo "| ${name} | ${outcome} | ${scen_cell} | ${group} | ${ref} | ${completed} | ${actor_cell} | ${evidence} |" >> docs/runs/index.md
          done
          if [ "$found_any" = "false" ]; then
            echo >> docs/runs/index.md
            echo "*No campaign runs landed yet. Dispatch the first one via Actions tab or* \`gh workflow run a2a-gate.yml\`." >> docs/runs/index.md
          fi

      - name: Regenerate per-run index.html (pick up generator upgrades)
        run: |
          set -euo pipefail
          for dir in runs/*/; do
            [ -d "$dir" ] || continue
            bash scripts/generate_run_html.sh "$dir" || true
          done

      - name: Build site
        run: mkdocs build

      - name: Mirror runs/ to site/evidence/
        run: |
          set -euo pipefail
          mkdir -p site/evidence
          if [ -d runs ] && [ "$(ls -A runs 2>/dev/null)" ]; then
            cp -r runs/. site/evidence/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

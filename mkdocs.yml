site_name: ai-memory A2A gate
site_description: >-
  AI-to-AI integration gate for ai-memory-mcp. 4-node harness
  exercising the full memory surface through IronClaw (Rust),
  Hermes (Python), and OpenClaw (Python) agents on DigitalOcean
  and a reproducible local Docker mesh. Runs after
  ai-memory-ship-gate Phases 1-4 pass.
site_url: https://alphaonedev.github.io/ai-memory-ai2ai-gate/
repo_url: https://github.com/alphaonedev/ai-memory-ai2ai-gate
repo_name: alphaonedev/ai-memory-ai2ai-gate
copyright: "Copyright &copy; 2026 AlphaOne LLC. Apache-2.0."

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Campaign runs: runs/
  - Reproducing:
      - Reproducing (DO): reproducing.md
      - Local Docker mesh: local-docker-mesh.md
  - Specification:
      - Baseline configuration: baseline.md
      - Test book: testbook.md
      - Every test performed: tests.md
      - v1.0 GA criteria: v1-ga-criteria.md
  - Agents:
      - IronClaw: agents/ironclaw.md
      - Hermes: agents/hermes.md
      - OpenClaw: agents/openclaw.md
  - Scenarios:
      - 1. Per-agent write + read: scenarios/1-write-read.md
      - 2. Shared-context handoff: scenarios/2-handoff.md
      - 3. Targeted share: scenarios/3-targeted-share.md
      - 4. Federation-aware agents: scenarios/4-federation.md
      - 5. Consolidation + curation: scenarios/5-consolidation.md
      - 6. Contradiction detection: scenarios/6-contradiction.md
      - 7. Scoping visibility: scenarios/7-scoping.md
      - 8. Auto-tagging: scenarios/8-auto-tagging.md
  - Architecture:
      - Architecture: architecture.md
      - Topology: topology.md
      - Methodology: methodology.md
      - ai-memory integration: ai-memory-integration.md
      - Infrastructure versions: infrastructure.md
  - Operations:
      - Runbook: runbook.md
      - Incidents: incidents.md
      - Security: security.md
  - AI NHI insights: insights.md

plugins:
  - search
  # Enables ./main.py to expose `render_current_release` etc. The landing
  # page (docs/index.md) calls these macros so a release bump only
  # requires adding releases/<version>/summary.json — no edits to
  # docs/index.md. See main.py for the schema.
  - macros:
      module_name: main

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
